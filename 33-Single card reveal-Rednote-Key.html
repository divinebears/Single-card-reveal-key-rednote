<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Essential Lenormand · Mystical Card Reveal</title>

<style>
:root{
  --gold:#e9c97a;
  --gold-bright:#fff2c2;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:"Cormorant Garamond","Times New Roman",serif;
  color:#f6e7c2;
}

.stage{
  position:relative;
  width:min(100vw, calc(100vh * 9 / 16));
  height:min(100vh, calc(100vw * 16 / 9));
  margin:0 auto;
  overflow:hidden;
  background:#000;
  box-shadow:0 0 80px #000 inset;
}

.bg-video-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  filter:saturate(1.08) contrast(1.05) brightness(0.98);
  pointer-events:none;
}

#bgVideoSource{
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
  left:-9999px;
  top:-9999px;
}

.grade{
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:
    radial-gradient(60% 40% at 50% 38%, rgba(255,190,120,.18), transparent 70%),
    radial-gradient(80% 60% at 50% 90%, rgba(60,10,30,.45), transparent 70%);
  mix-blend-mode:screen;
}

.vignette{
  position:absolute;
  inset:0;
  z-index:6;
  pointer-events:none;
  background:radial-gradient(120% 80% at 50% 55%, transparent 55%, rgba(0,0,0,.55) 100%);
}

.motes{
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  overflow:hidden;
}

.mote{
  position:absolute;
  width:3px;
  height:3px;
  border-radius:50%;
  background:radial-gradient(circle, #fff2c2 0%, rgba(255,210,140,.6) 40%, transparent 70%);
  filter:blur(.4px);
  opacity:0;
  animation:moteFloat linear infinite;
}

@keyframes moteFloat{
  0%{transform:translate3d(0,20px,0) scale(.6); opacity:0}
  20%{opacity:.9}
  80%{opacity:.7}
  100%{transform:translate3d(var(--dx,0px),-120vh,0) scale(1.2); opacity:0}
}

.card-stage{
  position:absolute;
  left:50%;
  top:62%;
  transform:translate(-50%,-50%);
  width:46%;
  aspect-ratio:5 / 8;
  z-index:4;
  perspective:1600px;
  perspective-origin:50% 40%;
}

.aura{
  position:absolute;
  left:50%;
  top:55%;
  width:140%;
  height:140%;
  transform:translate(-50%,-50%) scale(.2);
  background:
    radial-gradient(circle at 50% 50%, rgba(255,225,160,.55) 0%, rgba(255,180,90,.25) 25%, rgba(120,40,90,0) 60%);
  filter:blur(8px);
  opacity:0;
  z-index:0;
  pointer-events:none;
  animation:
    auraBloom 4.2s cubic-bezier(.2,.7,.2,1) .15s forwards,
    auraPulse 4s ease-in-out 4.2s infinite;
}

@keyframes auraBloom{
  0%{opacity:0; transform:translate(-50%,-50%) scale(.2)}
  35%{opacity:.85; transform:translate(-50%,-50%) scale(.9)}
  100%{opacity:.6; transform:translate(-50%,-50%) scale(1.15)}
}

@keyframes auraPulse{
  0%,100%{filter:blur(8px) brightness(1)}
  50%{filter:blur(10px) brightness(1.18)}
}

.card{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transform-origin:50% 60%;
  opacity:0;
  animation:
    cardReveal 3.85s linear 0s forwards,
    cardSettle 5s ease-in-out 5.35s infinite;
  filter:drop-shadow(0 30px 35px rgba(0,0,0,.65));
  will-change:transform, opacity;
}

@keyframes cardReveal{
  0%{
    opacity:0;
    transform:translate3d(0,28%,-120px) rotateX(70deg) rotateY(0deg) scale(.55);
  }
  10%{
    opacity:1;
    transform:translate3d(0,18%,-72px) rotateX(48deg) rotateY(0deg) scale(.72);
  }
  28%{
    opacity:1;
    transform:translate3d(0,-5%,48px) rotateX(10deg) rotateY(0deg) scale(1.02);
  }
  38%{
    opacity:1;
    transform:translate3d(0,-3%,58px) rotateX(4deg) rotateY(18deg) scale(1.03);
  }
  50%{
    opacity:1;
    transform:translate3d(0,-4%,84px) rotateX(0deg) rotateY(88deg) scale(1.045);
  }
  62%{
    opacity:1;
    transform:translate3d(0,-3%,58px) rotateX(0deg) rotateY(18deg) scale(1.025);
  }
  76%{
    opacity:1;
    transform:translate3d(0,0%,43px) rotateX(0deg) rotateY(0deg) scale(1);
  }
  100%{
    opacity:1;
    transform:translate3d(0,0%,40px) rotateX(0deg) rotateY(0deg) scale(1);
  }
}

@keyframes cardSettle{
  0%,100%{
    transform:translate3d(0,0%,40px) rotateX(0deg) rotateY(0deg) scale(1);
  }
  50%{
    transform:translate3d(0,-1.2%,55px) rotateX(-1.2deg) rotateY(.6deg) scale(1.01);
  }
}

.face{
  position:absolute;
  inset:0;
  overflow:hidden;
  border-radius:14px;
  background:#1b0a2a;
  box-shadow:
    0 0 0 1px rgba(255,225,160,.35) inset,
    0 0 0 3px rgba(40,15,40,.6) inset,
    0 18px 40px rgba(0,0,0,.55);
}

.face img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  object-position:center;
}

.face.back{
  opacity:1;
  z-index:1;
  animation:backFaceVisibility 3.85s linear 0s forwards;
}

.face.front{
  opacity:0;
  z-index:2;
  visibility:visible;
  animation:frontFaceVisibility 3.85s linear 0s forwards;
}

@keyframes backFaceVisibility{
  0%,49.8%{opacity:1; visibility:visible}
  49.9%,100%{opacity:0; visibility:hidden}
}

@keyframes frontFaceVisibility{
  0%,49.8%{opacity:0}
  49.9%,100%{opacity:1}
}

.face.front::before{
  content:"";
  position:absolute;
  inset:-18%;
  border-radius:18px;
  background:
    radial-gradient(circle at 25% 35%, rgba(255,235,170,.72) 0%, rgba(220,145,65,.28) 28%, transparent 58%),
    radial-gradient(circle at 70% 55%, rgba(255,216,140,.62) 0%, rgba(185,110,60,.22) 30%, transparent 62%),
    radial-gradient(circle at 50% 75%, rgba(255,242,194,.38) 0%, rgba(120,50,30,.2) 35%, transparent 68%),
    linear-gradient(180deg, rgba(45,15,35,.62), rgba(18,5,20,.2), rgba(45,15,35,.42));
  filter:blur(13px) saturate(1.2);
  opacity:1;
  transform:scale(1.12) rotate(0deg);
  mix-blend-mode:screen;
  animation:goldMistClear 1.4s cubic-bezier(.25,.8,.2,1) 2.6s forwards,
            goldMistDrift 4.5s ease-in-out 0s infinite alternate;
  pointer-events:none;
}

.face.front::after{
  content:"";
  position:absolute;
  inset:-8%;
  border-radius:18px;
  background:
    linear-gradient(115deg, transparent 30%, rgba(255,240,190,.55) 46%, rgba(255,210,120,.18) 54%, transparent 70%);
  transform:translateX(-125%) rotate(4deg);
  animation:revealShine .9s ease-out 4.25s forwards;
  mix-blend-mode:screen;
  pointer-events:none;
}

@keyframes goldMistClear{
  0%{opacity:1; filter:blur(13px) saturate(1.2); transform:scale(1.12) rotate(0deg)}
  55%{opacity:.55; filter:blur(16px) saturate(1.35); transform:scale(1.22) rotate(5deg)}
  100%{opacity:0; filter:blur(22px) saturate(1.1); transform:scale(1.38) translateY(-8%) rotate(10deg)}
}

@keyframes goldMistDrift{
  0%{background-position:0% 0%, 100% 30%, 40% 90%, 0 0}
  100%{background-position:80% 20%, 20% 70%, 80% 10%, 0 0}
}

@keyframes revealShine{
  0%{transform:translateX(-125%) rotate(4deg)}
  100%{transform:translateX(125%) rotate(4deg)}
}

.rim{
  position:absolute;
  inset:-6px;
  border-radius:18px;
  background:conic-gradient(
    from 0deg,
    rgba(255,225,160,0),
    rgba(255,225,160,.55),
    rgba(255,225,160,0) 40%,
    rgba(255,225,160,.55) 70%,
    rgba(255,225,160,0)
  );
  filter:blur(6px);
  opacity:0;
  z-index:-1;
  animation:rimGlow 1.6s ease-in-out 1.8s 1 forwards;
}

@keyframes rimGlow{
  0%{opacity:0; transform:scale(.96)}
  50%{opacity:.9; transform:scale(1.04)}
  100%{opacity:.35; transform:scale(1)}
}

.sparks{
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
}

.spark{
  position:absolute;
  left:50%;
  top:62%;
  width:6px;
  height:6px;
  border-radius:50%;
  background:radial-gradient(circle, #fff5d6 0%, rgba(255,210,140,.7) 50%, transparent 70%);
  opacity:0;
  animation:sparkBurst 1.4s ease-out 4s forwards;
}

@keyframes sparkBurst{
  0%{opacity:0; transform:translate(-50%,-50%) rotate(var(--a,0deg)) translateY(0) scale(.4)}
  20%{opacity:1}
  100%{opacity:0; transform:translate(-50%,-50%) rotate(var(--a,0deg)) translateY(var(--d,180px)) scale(1.2)}
}

.title{
  position:absolute;
  left:0;
  right:0;
  top:6%;
  text-align:center;
  z-index:7;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#f6e7c2;
  text-shadow:0 2px 12px rgba(0,0,0,.7), 0 0 18px rgba(255,200,120,.25);
  opacity:0;
  animation:fadeUp 1.2s ease-out .2s forwards;
}

.title small{
  display:block;
  font-size:9px;
  letter-spacing:.5em;
  color:#e9c97a;
  margin-bottom:6px;
}

.title h1{
  font-weight:500;
  font-size:18px;
  font-style:italic;
}

.caption{
  position:absolute;
  left:0;
  right:0;
  bottom:63%;
  text-align:center;
  z-index:7;
  color:#f6e7c2;
  opacity:0;
  animation:fadeUp 1s ease-out 5.05s forwards;
}

.caption .name{
  font-size:18px;
  letter-spacing:.10em;
  text-transform:uppercase;
  color:#fff2c2;
  text-shadow:0 0 14px rgba(255,200,120,.4), 0 2px 10px rgba(0,0,0,.7);
}

@keyframes fadeUp{
  0%{opacity:0; transform:translateY(14px)}
  100%{opacity:1; transform:translateY(0)}
}

.end-message{
    position:absolute;
    top:75%;
    left:50%;
    transform:translate(-50%,-50%);
    width:82%;
    max-width:700px;
    z-index:30;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:"Cormorant Garamond","Times New Roman",serif;
    font-style:italic;
    font-weight:700;
    font-size:20px;
    line-height:1.08;
    letter-spacing:.01em;
    color:#fff7d8;
    text-shadow:
        0 0 12px rgba(0,0,0,.98),
        0 0 28px rgba(0,0,0,.95),
        0 6px 22px rgba(0,0,0,1),
        0 0 30px rgba(255,215,140,.45);
    opacity:0;
    animation:endMessageFadeUp 1s ease-out 7.2s forwards;
}

@keyframes endMessageFadeUp{
from{
opacity:0;
transform:translate(-50%,calc(-50% + 18px)) scale(.95);
}
to{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}
}

.symbol-pop{
  position:absolute;
  left:50%;
  top:45%;
  width:35%;
  aspect-ratio:1/1;
  transform:translate(-50%,-50%) scale(.2);
  z-index:9;
  pointer-events:none;
  opacity:0;
  filter:
    drop-shadow(0 0 22px rgba(255,230,160,1))
    drop-shadow(0 0 55px rgba(255,180,90,.75))
    drop-shadow(0 18px 34px rgba(0,0,0,.7));
  animation:
    symbolPop 3.2s cubic-bezier(.16,.84,.28,1) 5.6s forwards,
    symbolFloat 5s ease-in-out 8.8s infinite;
}

.symbol-pop img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.symbol-glow{
  position:absolute;
  left:50%;
  top:40%;
  width:75%;
  aspect-ratio:1/1;
  transform:translate(-50%,-50%) scale(.3);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,240,180,.7) 0%, rgba(255,190,90,.32) 30%, rgba(180,80,60,.08) 60%, transparent 75%);
  filter:blur(20px);
  opacity:0;
  z-index:7;
  pointer-events:none;
  mix-blend-mode:screen;
  animation:symbolGlow 2.6s ease-out 5.6s forwards;
}

@keyframes symbolPop{
  0%{
    opacity:0;
    transform:translate(-50%,-50%) scale(.2) rotate(-3deg);
    filter:
      drop-shadow(0 0 0 rgba(255,225,160,0))
      blur(8px);
  }

  100%{
    opacity:1;
    transform:translate(-50%,-140%) scale(1.4) rotate(0deg);
    filter:
      drop-shadow(0 0 30px rgba(255,235,170,1))
      drop-shadow(0 0 60px rgba(255,180,90,.8))
      blur(0);
  }
}

@keyframes symbolGlow{
  0%{opacity:0; transform:translate(-50%,-50%) scale(.3)}
  45%{opacity:.95; transform:translate(-50%,-50%) scale(1.2)}
  100%{opacity:.65; transform:translate(-50%,-50%) scale(1)}
}

@keyframes symbolFloat{
  0%,100%{
    transform:translate(-50%,-140%) scale(1.4) rotate(0deg);
  }
  50%{
    transform:translate(-50%,-144%) scale(1.42) rotate(1deg);
  }
}
</style>
</head>

<body>
<div class="stage">

  <canvas class="bg-video-canvas" id="bgVideoCanvas"></canvas>

  <video
    id="bgVideoSource"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline
    preload="auto"
    src="IMG_0361.mp4">
  </video>

  <div class="grade"></div>
  <div class="motes" id="motes"></div>

  <div class="title">
    <small>拉娜·乔治 <br> Rana George </small>
    <h1>雷诺曼卡精要 <br> The Essential Lenormand</h1>
  </div>

  <div class="card-stage" aria-hidden="true">
    <div class="aura"></div>
    <div class="rim"></div>

    <div class="card">
      <div class="face back">
        <img src="https://raw.githubusercontent.com/divinebears/RG-lenormand-deck/main/RGL42_back.jpg" alt="">
      </div>

      <div class="face front">
        <img src="https://raw.githubusercontent.com/divinebears/RG-lenormand-deck/main/33_key.jpg" alt="">
      </div>
    </div>
  </div>

  <div class="sparks" id="sparks"></div>

  <div class="symbol-glow" aria-hidden="true"></div>

  <div class="symbol-pop" id="symbolPop" aria-hidden="true">
    <img src="https://raw.githubusercontent.com/divinebears/RG-lenormand-deck/refs/heads/main/33-key%20icon.png" alt="">
  </div>

  <div class="vignette"></div>

  <div class="caption">
    <div class="name">关键 <br> The Key</div>
  </div>

  <div class="end-message">
    保存这个视频，提醒自己：你已掌握通往成功的工具。<br> Save this video to remind yourself that you have the tools to your success
  </div>

</div>

<script>
const bgVideo = document.getElementById('bgVideoSource');
const bgCanvas = document.getElementById('bgVideoCanvas');
const bgCtx = bgCanvas.getContext('2d');

let drawingStarted = false;

function sizeCanvas(){
  const rect = bgCanvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  bgCanvas.width = Math.round(rect.width * dpr);
  bgCanvas.height = Math.round(rect.height * dpr);
}

function drawVideoFrame(){
  if(bgVideo.readyState >= 2 && bgVideo.videoWidth && bgVideo.videoHeight){
    const canvasRatio = bgCanvas.width / bgCanvas.height;
    const videoRatio = bgVideo.videoWidth / bgVideo.videoHeight;

    let sx = 0;
    let sy = 0;
    let sw = bgVideo.videoWidth;
    let sh = bgVideo.videoHeight;

    if(videoRatio > canvasRatio){
      sw = bgVideo.videoHeight * canvasRatio;
      sx = (bgVideo.videoWidth - sw) / 2;
    }else{
      sh = bgVideo.videoWidth / canvasRatio;
      sy = (bgVideo.videoHeight - sh) / 2;
    }

    bgCtx.drawImage(bgVideo, sx, sy, sw, sh, 0, 0, bgCanvas.width, bgCanvas.height);
  }

  requestAnimationFrame(drawVideoFrame);
}

function keepBackgroundVideoPlaying(){
  bgVideo.muted = true;
  bgVideo.defaultMuted = true;
  bgVideo.playsInline = true;
  bgVideo.controls = false;
  bgVideo.removeAttribute('controls');

  const playAttempt = bgVideo.play();

  if(playAttempt && typeof playAttempt.catch === 'function'){
    playAttempt.catch(() => {
      setTimeout(() => bgVideo.play().catch(() => {}), 250);
    });
  }
}

function startCanvasVideo(){
  sizeCanvas();
  keepBackgroundVideoPlaying();

  if(!drawingStarted){
    drawingStarted = true;
    drawVideoFrame();
  }
}

window.addEventListener('resize', sizeCanvas);
window.addEventListener('pageshow', keepBackgroundVideoPlaying);

document.addEventListener('visibilitychange', () => {
  if(!document.hidden) keepBackgroundVideoPlaying();
});

bgVideo.addEventListener('loadeddata', startCanvasVideo, { once:true });
bgVideo.addEventListener('canplay', keepBackgroundVideoPlaying);
bgVideo.addEventListener('pause', keepBackgroundVideoPlaying);

startCanvasVideo();

const motes = document.getElementById('motes');

for(let i = 0; i < 38; i++){
  const m = document.createElement('span');
  m.className = 'mote';

  const dur = 7 + Math.random() * 9;
  const delay = -Math.random() * dur;
  const left = Math.random() * 100;
  const dx = (Math.random() * 60 - 30) + 'px';
  const size = 2 + Math.random() * 3;

  m.style.cssText = `
    left:${left}%;
    bottom:-10px;
    width:${size}px;
    height:${size}px;
    animation-duration:${dur}s;
    animation-delay:${delay}s;
    --dx:${dx};
    opacity:${0.4 + Math.random() * 0.5};
  `;

  motes.appendChild(m);
}

const sparks = document.getElementById('sparks');

for(let i = 0; i < 26; i++){
  const s = document.createElement('span');
  s.className = 'spark';

  const a = (360 / 26) * i + (Math.random() * 10 - 5);
  const d = 140 + Math.random() * 120;
  const size = 3 + Math.random() * 5;

  s.style.setProperty('--a', a + 'deg');
  s.style.setProperty('--d', d + 'px');
  s.style.width = size + 'px';
  s.style.height = size + 'px';
  s.style.animationDelay = (4.35 + Math.random() * 0.3) + 's';

  sparks.appendChild(s);
}
</script>

</body>
</html>
